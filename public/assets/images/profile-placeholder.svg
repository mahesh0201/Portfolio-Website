<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#12121a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="140" cy="140" r="140" fill="url(#bg)"/>
  <circle cx="140" cy="140" r="140" fill="url(#glow)"/>
  <!-- Body -->
  <ellipse cx="140" cy="220" rx="70" ry="50" fill="#0f0f1a" opacity="0.7"/>
  <!-- Head -->
  <circle cx="140" cy="110" r="50" fill="#1e1e30"/>
  <!-- Hexagon accents -->
  <polygon points="140,30 160,41 160,63 140,74 120,63 120,41" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.3"/>
  <text x="140" y="115" text-anchor="middle" fill="#00f0ff" font-size="22" font-family="Share Tech Mono, monospace" opacity="0.8">JD</text>
  <!-- Circuit lines -->
  <line x1="40" y1="140" x2="80" y2="140" stroke="#00f0ff" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="140" x2="240" y2="140" stroke="#00f0ff" stroke-width="1" opacity="0.2"/>
  <circle cx="80" cy="140" r="3" fill="#00f0ff" opacity="0.4"/>
  <circle cx="200" cy="140" r="3" fill="#00f0ff" opacity="0.4"/>
</svg>
